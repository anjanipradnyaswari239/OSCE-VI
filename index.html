<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSCE Simulation</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>OSCE Simulation</h1>

        <div class="control-panel">
            <button id="generateBtn" class="btn btn-secondary">Generate Stations</button>
        </div>

        <div class="instructions">
            Select the checklists you want to include in the random draw before pressing Generate Stations.
        </div>

        <div class="selection-panel">
            <h2>Checklist Selection</h2>
            <div id="selectionPanel"></div>
            <div id="selectionError" class="error-message hidden"></div>
        </div>

        <div class="stations-section">
            <h2>Selected Stations</h2>
            <div id="stationsList" class="stations-list">
                <p>Click "Generate Stations" to generate 4 station cards.</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
